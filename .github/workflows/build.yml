name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install flet
      - run: python -m flet build apk chat.py
      - uses: actions/upload-artifact@v4
        with:
          name: chat-app
          path: build/apk/*.apk
