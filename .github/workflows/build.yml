name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flet
        run: pip install flet
      - name: Build APK
        run: flet build apk
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: "*.apk"
