name: Build APK
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install flet
        run: pip install flet
      - name: Make test file
        run: |
          echo "import flet as ft" > test.py
          echo "" >> test.py
          echo "def main(page: ft.Page):" >> test.py
          echo "    page.add(ft.Text('Hello World'))" >> test.py
          echo "" >> test.py
          echo "ft.app(target=main)" >> test.py
      - name: Run test
        run: python test.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: "*.apk"
